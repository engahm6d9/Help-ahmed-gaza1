<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تبرع بالكريبتو | دعم المشروع</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; text-align: center; padding: 50px 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; margin: 0 auto; }
        .crypto-icon { width: 60px; height: 60px; margin-bottom: 20px; }
        .address-box { background: #eee; padding: 15px; border-radius: 8px; word-break: break-all; font-family: monospace; font-size: 1.1em; margin: 20px 0; border: 1px dashed #26a17b; }
        .network-tag { background: #26a17b; color: white; padding: 5px 12px; border-radius: 20px; font-size: 0.8em; }
        .copy-btn { background: #26a17b; color: white; border: none; padding: 10px 25px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .copy-btn:hover { background: #1e7e60; }
        .warning { color: #d9534f; font-size: 0.9em; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://cryptologos.cc/logos/tether-usdt-logo.png" alt="USDT Logo" class="crypto-icon">
        <h2>ادعمنا عبر USDT</h2>
        <p>نقبل التبرعات عبر شبكة TRON فقط</p>
        <span class="network-tag">Network: TRC20</span>

        <div class="address-box" id="walletAddress">
            TDRr5CmsZU6zYsTiC1FhY9SuBFrmR9EHfY
        </div>

        <button class="copy-btn" onclick="copyAddress()">نسخ العنوان</button>

        <p class="warning">تأكد من إرسال USDT عبر شبكة (TRC20) فقط لتجنب فقدان الأموال.</p>
    </div>

    <script>
        function copyAddress() {
            const address = document.getElementById('walletAddress').innerText;
            navigator.clipboard.writeText(address);
            alert("تم نسخ العنوان بنجاح!");
        }
    </script>

</body>
</html>
